<div class="tarjeta">
    <div class="productos-toolbar">
        <div class="productos-titulo">
            <h2>Historial de Movimientos</h2>
            <span id="cantidadMovimientos">
                0 movimientos
            </span>
        </div>
    </div>
    <div class="productos-filtros">
        <input
            type="text"
            id="buscarMovimiento"
            placeholder="Buscar movimiento...">
    </div>
    <div class="tabla-contenedor">
        <table class="tabla">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Tipo</th>
                    <th>Cantidad</th>
                    <th>Antes</th>
                    <th>Después</th>
                    <th>Motivo</th>
                </tr>
            </thead>
            <tbody id="tablaMovimientos">
            </tbody>
        </table>
    </div>
</div>
