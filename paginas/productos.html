<div class="tarjeta">
    <div class="productos-header">
        <h2>
            Productos
        </h2>
        <button id="btnNuevoProducto">
            + Nuevo Producto
        </button>
    </div>

    <input
        type="text"
        id="buscarProducto"
        placeholder="Buscar producto...">

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody id="tablaProductos">
        </tbody>
    </table>
</div>
